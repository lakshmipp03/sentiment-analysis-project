<!DOCTYPE html>
<html>

<head>

    <title>View History</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: Arial, sans-serif;

            background:
                linear-gradient(
                    rgba(0,0,0,0.65),
                    rgba(0,0,0,0.65)
                ),

                url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1974&auto=format&fit=crop');

            background-size: cover;

            background-position: center;

            background-attachment: fixed;

            color: white;

            text-align: center;

            min-height: 100vh;

            padding-top: 50px;

            padding-bottom: 50px;
        }

        .container {

            width: 90%;

            margin: auto;

            background: rgba(255,255,255,0.12);

            backdrop-filter: blur(12px);

            padding: 30px;

            border-radius: 20px;

            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h1 {

            margin-bottom: 30px;

            font-size: 42px;
        }

        table {

            width: 100%;

            border-collapse: collapse;

            margin-top: 20px;

            background: rgba(255,255,255,0.15);

            color: white;

            border-radius: 15px;

            overflow: hidden;
        }

        th {

            background: #667eea;

            color: white;

            padding: 15px;
        }

        td {

            padding: 15px;

            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        tr:hover {

            background: rgba(255,255,255,0.1);
        }

        button {

            background: #667eea;

            color: white;

            border: none;

            padding: 12px 24px;

            border-radius: 10px;

            cursor: pointer;

            font-size: 16px;

            margin-top: 30px;

            transition: 0.3s;
        }

        button:hover {

            background: #5a67d8;

            transform: scale(1.05);
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Review History</h1>

        <table>

            <tr>

                <th>ID</th>

                <th>Review</th>

                <th>Prediction</th>

                <th>Emotion</th>

            </tr>

            {% for item in history %}

            <tr>

                <td>{{ item[0] }}</td>

                <td>{{ item[1] }}</td>

                <td>{{ item[2] }}</td>

                <td>{{ item[3] }}</td>

            </tr>

            {% endfor %}

        </table>

        <a href="/home">

            <button>

                Back to Home

            </button>

        </a>

    </div>

</body>

</html>
