<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <style>

        body {

            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            padding-top: 100px;
        }

        .login-box {

            background: white;
            width: 350px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
        }

        input {

            width: 80%;
            padding: 10px;
            margin: 10px;
        }

        button {

            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>Login</h1>

        <form action="/login" method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required>

            <br>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <br><br>

            <button type="submit">

                Login

            </button>

        </form>

    </div>

</body>

</html>
