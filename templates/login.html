<!DOCTYPE html>
<html>

<head>

    <title>AI-Powered Sentiment Analysis Tool</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: Arial, sans-serif;

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            background:
                linear-gradient(
                    rgba(0,0,0,0.5),
                    rgba(0,0,0,0.5)
                ),

                url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1974&auto=format&fit=crop');

            background-size: cover;

            background-position: center;
        }

        .login-box {

            width: 400px;

            background: rgba(255,255,255,0.12);

            backdrop-filter: blur(12px);

            padding: 40px;

            border-radius: 20px;

            text-align: center;

            color: white;

            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h1 {

            margin-bottom: 15px;

            font-size: 34px;
        }

        p {

            margin-bottom: 30px;

            font-size: 16px;

            color: #f1f1f1;
        }

        input {

            width: 100%;

            padding: 14px;

            margin: 12px 0;

            border: none;

            border-radius: 10px;

            font-size: 16px;
        }

        input:focus {

            outline: none;
        }

        button {

            width: 100%;

            padding: 14px;

            border: none;

            border-radius: 10px;

            background: #667eea;

            color: white;

            font-size: 18px;

            cursor: pointer;

            transition: 0.3s;

            margin-top: 10px;
        }

        button:hover {

            background: #5a67d8;

            transform: scale(1.03);
        }

        .footer-text {

            margin-top: 20px;

            font-size: 13px;

            color: #ddd;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>AI-Powered Sentiment Analysis Tool</h1>

        <p>

            Smart Customer Review Analytics Platform

        </p>

        <form action="/login" method="POST">

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required>

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

            <button type="submit">

                Login

            </button>

        </form>

        <div class="footer-text">

            Developed using AI, NLP & Machine Learning

        </div>

    </div>

</body>

</html>
